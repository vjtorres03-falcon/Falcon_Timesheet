<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Falcon Electric — Timesheet</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #111111;
  --yellow: #F5C400;
  --ydark: #B8940A;
  --gray: #F0F0F0;
  --mgray: #555;
  --border: #D0D0D0;
  --blue: #E8F0FC;
  --altrow: #F5F8FF;
  --drive: #FFFBEA;
  --dborder: #E0CF60;
  --total: #FFF5CC;
  --grand: #FFF0A0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Barlow', sans-serif; background: #1a1a1a; }

/* ── HEADER ── */
.hdr {
  background: var(--black);
  border-bottom: 4px solid var(--yellow);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.hdr img { height: clamp(70px, 10vw, 130px); width: auto; flex-shrink: 0; max-width: 260px; }
.hdr-mid { flex: 1; text-align: center; }
.hdr-mid h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(1.1rem, 3vw, 2.1rem);
  font-weight: 800; color: #fff; letter-spacing: 3px;
  text-transform: uppercase; line-height: 1;
}
.hdr-mid small {
  display: block; color: #F5C400;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: clamp(0.6rem, 1.4vw, 0.82rem);
  margin-top: 5px; letter-spacing: 2px;
}
.hdr-right {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 6px;
  flex-shrink: 0;
  min-width: 120px;
}
.save-indicator {
  font-size: 0.55rem; color: #666;
  font-family: 'Barlow', sans-serif;
  text-align: center; min-height: 12px;
}
.btn-save {
  background: #1e1e1e; color: var(--yellow);
  border: 1.5px solid #3a3200;
  padding: 8px 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; border-radius: 5px;
  transition: all 0.15s; text-align: center;
}
.btn-save:hover { background: #2a2a00; border-color: var(--yellow); }
.btn-clear {
  background: #1e1e1e; color: #e07070;
  border: 1.5px solid #3a2020;
  padding: 8px 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; border-radius: 5px;
  transition: all 0.15s; text-align: center;
}
.btn-clear:hover { background: #2a1010; color: #ffaaaa; }
.btn-print {
  background: #1e1e1e; color: #aaa;
  border: 1.5px solid #333;
  padding: 8px 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; border-radius: 5px;
  transition: all 0.15s; text-align: center;
}
.btn-print:hover { background: #2a2a2a; color: #fff; }
.submit-btn {
  background: var(--yellow); color: var(--black); border: none;
  padding: 10px 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; border-radius: 5px;
  box-shadow: 0 3px 12px rgba(245,196,0,0.25);
  transition: all 0.15s; text-align: center;
}
.submit-btn:hover { background: #ffd700; box-shadow: 0 5px 18px rgba(245,196,0,0.4); }
.submit-btn:active { transform: scale(0.97); }

/* ── INFO ── */
.info {
  background: var(--gray); border-left: 5px solid var(--yellow);
  padding: 12px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px;
}
.info-field { display: flex; flex-direction: column; gap: 3px; }
.info-field label { font-size: 0.58rem; font-weight: 700; color: var(--mgray); text-transform: uppercase; letter-spacing: 1px; }
.info-field input {
  border: none; border-bottom: 2px solid var(--yellow); background: transparent;
  padding: 4px 2px; font-family: 'Barlow', sans-serif; font-size: 0.9rem;
  color: var(--black); outline: none; width: 100%; -webkit-appearance: none; border-radius: 0;
}
.info-field.full { grid-column: 1 / -1; }

/* ── DESKTOP VIEW ── */
.desktop-view { display: block; }
.mobile-view  { display: none; }

.tbl-wrap { overflow-x: auto; background: #fff; border-radius: 0 0 10px 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }

/* Per-day name header row */
.day-name-hdr { background: #1e1e1e; }
.day-name-hdr td { padding: 0; border-right: 1px solid #333; border-bottom: 2px solid var(--yellow); }
.day-name-hdr td.day-label-cell {
  background: var(--black); color: var(--yellow);
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
  font-size: 0.85rem; text-align: center; letter-spacing: 1px;
  text-transform: uppercase; padding: 5px 3px; border-right: 2px solid var(--yellow);
  white-space: nowrap;
}
.day-name-hdr td.emp-name-cell { background: #1e1e1e; }
.day-name-hdr td.emp-name-cell input {
  width: 100%; background: transparent; border: none; border-bottom: 1px solid #444;
  color: #ddd; text-align: center; font-family: 'Barlow', sans-serif;
  font-size: 0.62rem; padding: 4px 2px; outline: none; min-height: 24px;
}
.day-name-hdr td.emp-name-cell input::placeholder { color: #555; }
.day-name-hdr td.job-filler {
  background: #1e1e1e; padding: 0;
}

/* Column header (once at top) */
.col-hdr-row th {
  background: var(--black); color: #fff;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 7px 3px; text-align: center; border-right: 1px solid #333; white-space: nowrap;
  position: sticky; top: 0; z-index: 2;
}
.col-hdr-row th.job-col { text-align: left; padding-left: 7px; min-width: 125px; }
.col-hdr-row th.day-col { min-width: 46px; }
.col-hdr-row th.num-col { min-width: 50px; }
.col-hdr-row th.for-col { min-width: 58px; }

/* Data cells */
td { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 0; }
td input[type=number], td input[type=text] {
  width: 100%; height: 100%; min-height: 24px; border: none;
  background: transparent; text-align: center;
  font-family: 'Barlow', sans-serif; font-size: 0.7rem; color: var(--black);
  padding: 1px 3px; outline: none;
  -webkit-appearance: none; -moz-appearance: textfield; border-radius: 0;
}
td input[type=number]::-webkit-inner-spin-button,
td input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
td input:focus { background: rgba(245,196,0,0.15); }
td.jname input { text-align: left; padding-left: 6px; }
td.day-cell {
  background: var(--black); color: var(--yellow);
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 0.78rem; text-align: center; vertical-align: middle;
  border-right: 2px solid var(--yellow); padding: 3px; white-space: nowrap;
}
tr.jr0 td { background: var(--blue); }
tr.jr1 td { background: var(--altrow); }
tr.drv td { background: var(--drive); border-bottom-color: var(--dborder); }
tr.drv td.dlabel {
  color: var(--ydark); font-style: italic; font-size: 0.6rem;
  padding-left: 12px; vertical-align: middle; white-space: nowrap;
}
tr.daysep td { border-bottom: 2px solid #888; }
tr.tot-row td {
  background: var(--total); font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 0.8rem; text-align: center;
  padding: 5px 3px; border-top: 2px solid var(--black); color: var(--black);
}
tr.tot-row td.tot-lbl { background: var(--yellow); font-size: 0.68rem; letter-spacing: 0.5px; text-transform: uppercase; }
tr.grand-row td {
  background: var(--grand); font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 0.82rem; text-align: center;
  padding: 6px 3px; border-top: 3px solid var(--black); color: var(--black);
}
tr.grand-row td.grand-lbl {
  background: var(--black); color: var(--yellow);
  font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  .desktop-view { display: none; }
  .mobile-view  { display: block; background: #1a1a1a; padding: 10px; }
  .info { grid-template-columns: 1fr 1fr; }

  .day-card { background: #fff; border-radius: 10px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 3px 16px rgba(0,0,0,0.2); }
  .day-card-hdr {
    background: var(--black); color: var(--yellow);
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 1.05rem; letter-spacing: 2px; text-transform: uppercase;
    padding: 9px 14px; display: flex; justify-content: space-between; align-items: center;
  }
  .day-card-hdr span { font-size: 0.65rem; color: #888; font-weight: 400; letter-spacing: 0; font-family: 'Barlow', sans-serif; }

  /* Employee names inside each day card */
  .day-emp-section {
    background: #1e1e1e; padding: 8px 12px;
    border-bottom: 2px solid var(--yellow);
  }
  .day-emp-section .emp-section-lbl {
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.6rem;
    color: var(--yellow); letter-spacing: 2px; text-transform: uppercase;
    font-weight: 700; margin-bottom: 6px; display: block;
  }
  .day-emp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .day-emp-item { display: flex; flex-direction: column; gap: 1px; }
  .day-emp-item label { font-size: 0.5rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .day-emp-item input {
    background: transparent; border: none; border-bottom: 1px solid #444;
    color: #fff; font-family: 'Barlow', sans-serif; font-size: 0.78rem;
    padding: 3px 2px; outline: none; width: 100%; border-radius: 0;
  }
  .day-emp-item input::placeholder { color: #555; }

  .job-block { border-bottom: 1px solid var(--border); }
  .job-block-hdr {
    background: var(--blue); padding: 5px 12px;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 0.72rem; color: var(--black); text-transform: uppercase; letter-spacing: 1px;
  }
  .job-block-hdr.odd { background: var(--altrow); }
  .job-inputs { padding: 7px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .job-field { display: flex; flex-direction: column; gap: 2px; }
  .job-field label { font-size: 0.55rem; font-weight: 700; color: var(--mgray); text-transform: uppercase; letter-spacing: 0.5px; }
  .job-field input {
    border: none; border-bottom: 1.5px solid var(--border); padding: 4px 2px;
    font-family: 'Barlow', sans-serif; font-size: 0.85rem; color: var(--black);
    outline: none; background: transparent; width: 100%;
    -webkit-appearance: none; -moz-appearance: textfield; border-radius: 0;
  }
  .job-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .job-field input:focus { border-bottom-color: var(--yellow); }
  .job-field.full { grid-column: 1 / -1; }
  .emp-hrs-grid { grid-column: 1/-1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }

  .drive-block { background: var(--drive); border-top: 1px dashed var(--dborder); padding: 5px 12px 7px; }
  .drive-lbl { font-size: 0.6rem; font-style: italic; color: var(--ydark); font-weight: 600; margin-bottom: 4px; display: block; }
  .drive-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .drive-field { display: flex; flex-direction: column; gap: 1px; }
  .drive-field label { font-size: 0.5rem; color: var(--ydark); font-weight: 600; text-transform: uppercase; }
  .drive-field input {
    border: none; border-bottom: 1px solid var(--dborder); padding: 3px 2px;
    font-family: 'Barlow', sans-serif; font-size: 0.82rem; color: var(--black);
    outline: none; background: transparent; width: 100%;
    -webkit-appearance: none; -moz-appearance: textfield; border-radius: 0;
  }
  .drive-field input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .day-totals { background: var(--total); padding: 8px 12px; }
  .day-totals .tot-hdr {
    background: var(--yellow); margin: -8px -12px 7px; padding: 4px 12px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.68rem;
    letter-spacing: 1px; text-transform: uppercase; font-weight: 700; color: var(--black);
  }
  .day-totals .tot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .day-totals .tot-item {
    text-align: center; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 0.85rem; color: var(--black);
  }
  .day-totals .tot-item span { display: block; font-size: 0.5rem; color: var(--mgray); font-weight: 400; font-family: 'Barlow', sans-serif; }

  .grand-card {
    background: var(--black); border-radius: 10px; padding: 14px;
    margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .grand-card h3 {
    font-family: 'Barlow Condensed', sans-serif; color: var(--yellow);
    font-size: 0.95rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
  }
  .grand-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .grand-item {
    background: var(--grand); border-radius: 5px; padding: 7px 4px; text-align: center;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1rem; color: var(--black);
  }
  .grand-item span { display: block; font-size: 0.5rem; color: var(--mgray); font-weight: 400; font-family: 'Barlow', sans-serif; margin-top: 2px; }

  /* Mobile header */
  .hdr { padding: 10px 12px; gap: 10px; }
  .hdr img { height: 44px; max-width: 120px; }
  .hdr-right { min-width: 100px; gap: 5px; }
  .btn-save, .btn-clear, .btn-print, .submit-btn {
    padding: 7px 8px; font-size: 0.7rem; letter-spacing: 0.5px;
  }
}

#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--black); color: var(--yellow);
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.95rem;
  padding: 12px 22px; border-radius: 8px; border-left: 4px solid var(--yellow);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4); opacity: 0;
  transition: all 0.3s ease; pointer-events: none; z-index: 9999; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── PRINT ── */
@media print {
  body { background: #fff; padding: 0; }
  .hdr { background: #111 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 10px 14px; }
  .save-indicator { display: none; }
  .info { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .desktop-view { display: block !important; }
  .mobile-view { display: none !important; }
  .tbl-wrap { box-shadow: none; border: 1px solid #ccc; }
  table { font-size: 0.62rem; }
  .day-name-hdr td.day-label-cell { background: #111 !important; color: #F5C400 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .day-name-hdr { background: #1e1e1e !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.jr0 td { background: #E8F0FC !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.drv td { background: #FFFBEA !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.tot-row td { background: #FFF5CC !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.tot-row td.tot-lbl { background: #F5C400 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.grand-row td { background: #FFF0A0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.grand-row td.grand-lbl { background: #111 !important; color: #F5C400 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #toast { display: none; }
  .confirmation-overlay { display: none !important; }
}
</style>
</head>

<script>
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const JOBS = 6;
const EMPS = 6;
const EMAILS = "projectmanager@falconelectricinc.com,berit@falconelectricinc.com,projectassistant@falconelectricinc.com,bonnie@falconelectricinc.com";

// ── AUTO WEEK ENDING ───────────────────────────────────────────────
function getNextSunday() {
  const today = new Date();
  const day = today.getDay();
  const diff = day === 0 ? 0 : 7 - day;
  const sun = new Date(today);
  sun.setDate(today.getDate() + diff);
  return sun.toISOString().split('T')[0];
}

// ── SAVE ───────────────────────────────────────────────────────────
function saveProgress() {
  const data = {
    weekEnding: document.getElementById('weekEnding').value,
    foreman:    document.getElementById('foreman').value,
    addlNotes:  document.getElementById('addlNotes').value,
    saved:      new Date().toISOString(),
    fields:     {}
  };
  document.querySelectorAll('input').forEach(inp => {
    if (!inp.value) return;
    const key = inp.id || (inp.dataset.day||inp.dataset.mday||'') + '_' +
      (inp.dataset.job||inp.dataset.mjob||'') + '_' +
      (inp.dataset.col||inp.dataset.mcol||'') + '_' +
      (inp.dataset.emp||inp.dataset.memp||'') + '_' +
      (inp.dataset.drive||inp.dataset.mdrive||'') + '_' + inp.className;
    if (key) data.fields[key] = inp.value;
  });
  try {
    localStorage.setItem('falconTimesheet', JSON.stringify(data));
    const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById('saveIndicator').textContent = '\u2713 Saved at ' + ts;
    showToast('\u2713 Progress saved!');
  } catch(e) {
    showToast('\u26A0 Could not save \u2014 check browser settings');
  }
}

// ── LOAD ───────────────────────────────────────────────────────────
function loadSaved() {
  try {
    const raw = localStorage.getItem('falconTimesheet');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.weekEnding) document.getElementById('weekEnding').value = data.weekEnding;
    if (data.foreman)    document.getElementById('foreman').value    = data.foreman;
    if (data.addlNotes)  document.getElementById('addlNotes').value  = data.addlNotes;
    document.querySelectorAll('input').forEach(inp => {
      const key = inp.id || (inp.dataset.day||inp.dataset.mday||'') + '_' +
        (inp.dataset.job||inp.dataset.mjob||'') + '_' +
        (inp.dataset.col||inp.dataset.mcol||'') + '_' +
        (inp.dataset.emp||inp.dataset.memp||'') + '_' +
        (inp.dataset.drive||inp.dataset.mdrive||'') + '_' + inp.className;
      if (key && data.fields[key]) inp.value = data.fields[key];
    });
    calcTotals();
    for (let di = 0; di < DAYS.length; di++) updateMobileLabels(di);
    const saved = new Date(data.saved);
    const ts = saved.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}) + ' ' +
               saved.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('saveIndicator').textContent = '\u21A9 Restored save from ' + ts;
  } catch(e) {}
}

// ── CLEAR ──────────────────────────────────────────────────────────
function clearForm() {
  if (!confirm('Clear all entries and start a new week?')) return;
  localStorage.removeItem('falconTimesheet');
  document.querySelectorAll('input').forEach(i => i.value = '');
  document.getElementById('weekEnding').value = getNextSunday();
  calcTotals();
  for (let di = 0; di < DAYS.length; di++) updateMobileLabels(di);
  document.getElementById('saveIndicator').textContent = '';
  showToast('Form cleared for new week');
}

// ── PRINT ──────────────────────────────────────────────────────────
function printSheet() { window.print(); }

// ── TOAST ──────────────────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── CONFIRM ────────────────────────────────────────────────────────
function showConfirm(summary) {
  document.getElementById('confirmBody').textContent = summary;
  document.getElementById('confirmOverlay').style.display = 'block';
}
function closeConfirm() {
  document.getElementById('confirmOverlay').style.display = 'none';
}

// ── VALIDATE ───────────────────────────────────────────────────────
function validateForm() {
  const errors = [];
  if (!document.getElementById('weekEnding').value) errors.push('\u26A0 Week Ending date is required.');
  if (!document.getElementById('foreman').value.trim()) errors.push('\u26A0 Foreman name is required.');
  const isMob = window.innerWidth <= 768;
  let hasHours = false, highHours = false;
  document.querySelectorAll(isMob ? '.m-hrs' : '.d-hrs').forEach(inp => {
    const v = parseFloat(inp.value) || 0;
    if (v > 0) hasHours = true;
    if (v > 16) highHours = true;
  });
  if (!hasHours) errors.push('\u26A0 No hours have been entered yet.');
  if (highHours) errors.push('\u26A0 One or more hour entries exceed 16 hours \u2014 please check for typos.');
  return errors;
}

}

// ── UPDATE MOBILE LABELS ────────────────────────────────────────────
function updateMobileLabels(di) {
  for (let ei = 0; ei < EMPS; ei++) {
    const inp = document.querySelector('.m-emp-name[data-mday="' + di + '"][data-col="' + ei + '"]');

    for (let ji = 0; ji < JOBS; ji++) {
      const jl = document.getElementById('mlbl-' + di + '-' + ei + '-' + ji);
      if (jl) jl.textContent = name + ' Hrs';
      const dl = document.getElementById('mdlbl-' + di + '-' + ei + '-' + ji);
      if (dl) dl.textContent = name;
    }
    const tl = document.getElementById('mtot-lbl-' + di + '-' + ei);
    if (tl) tl.textContent = name;
  }
}

// ── TOTALS ─────────────────────────────────────────────────────
function calcTotals() {
  const fmt = n => n > 0 ? (n === Math.round(n) ? String(n) : n.toFixed(2)) : '—';
  const isMob = window.innerWidth <= 768;
  for (let di = 0; di < DAYS.length; di++) {
    let forReg=0, forDrv=0;
    const empReg=Array(EMPS).fill(0), empDrv=Array(EMPS).fill(0);
    if (isMob) {
      document.querySelectorAll('.m-hrs[data-mday="' + di + '"]').forEach(inp => {
        const v=parseFloat(inp.value)||0;
        if (inp.dataset.mcol==='for') forReg+=v;
        else if (inp.dataset.mcol==='for-drive') forDrv+=v;
        else if (inp.dataset.memp!==undefined) {
          if (inp.dataset.mdrive) empDrv[parseInt(inp.dataset.memp)]+=v;
          else empReg[parseInt(inp.dataset.memp)]+=v;
        }
      });
      const hr=document.getElementById('mfor-reg-'+di); if(hr){const s=hr.querySelector('span');hr.textContent=fmt(forReg);if(s)hr.appendChild(s);}
      const hd=document.getElementById('mfor-drv-'+di); if(hd){const s=hd.querySelector('span');hd.textContent=fmt(forDrv);if(s)hd.appendChild(s);}
      for(let ei=0;ei<EMPS;ei++){
        const er=document.getElementById('memp-reg-'+di+'-'+ei); if(er){const s=er.querySelector('span');er.textContent=fmt(empReg[ei]);if(s)er.appendChild(s);}
        const ed=document.getElementById('memp-drv-'+di+'-'+ei); if(ed){const s=ed.querySelector('span');ed.textContent=fmt(empDrv[ei]);if(s)ed.appendChild(s);}
      }
    } else {
      document.querySelectorAll('.d-hrs[data-day="' + di + '"]').forEach(inp => {
        const v=parseFloat(inp.value)||0;
        if (inp.dataset.col==='for') forReg+=v;
        else if (inp.dataset.col==='for-drive') forDrv+=v;
        else if (inp.dataset.emp!==undefined) {
          if (inp.dataset.drive) empDrv[parseInt(inp.dataset.emp)]+=v;
          else empReg[parseInt(inp.dataset.emp)]+=v;
        }
      });
      const dr=document.getElementById('dfor-reg-'+di); if(dr) dr.textContent=fmt(forReg);
      const dd=document.getElementById('dfor-drv-'+di); if(dd) dd.textContent=fmt(forDrv);
      for(let ei=0;ei<EMPS;ei++){
        const er=document.getElementById('demp-reg-'+di+'-'+ei); if(er) er.textContent=fmt(empReg[ei]);
        const ed=document.getElementById('demp-drv-'+di+'-'+ei); if(ed) ed.textContent=fmt(empDrv[ei]);
      }
    }
  }
  let gfReg=0,gfDrv=0; const geReg=Array(EMPS).fill(0),geDrv=Array(EMPS).fill(0);
  document.querySelectorAll(isMob?'.m-hrs':'.d-hrs').forEach(inp=>{
    const v=parseFloat(inp.value)||0;
    const col=isMob?inp.dataset.mcol:inp.dataset.col;
    const emp=isMob?inp.dataset.memp:inp.dataset.emp;
    const drv=isMob?inp.dataset.mdrive:inp.dataset.drive;
    if(col==='for') gfReg+=v;
    else if(col==='for-drive') gfDrv+=v;
    else if(emp!==undefined){ if(drv) geDrv[parseInt(emp)]+=v; else geReg[parseInt(emp)]+=v; }
  });
  if(isMob){
    const mgr=document.getElementById('mgfor-reg'); if(mgr){const s=mgr.querySelector('span');mgr.textContent=fmt(gfReg);if(s)mgr.appendChild(s);}
    const mgd=document.getElementById('mgfor-drv'); if(mgd){const s=mgd.querySelector('span');mgd.textContent=fmt(gfDrv);if(s)mgd.appendChild(s);}
    for(let ei=0;ei<EMPS;ei++){
      const er=document.getElementById('mgemp-reg-'+ei); if(er){const s=er.querySelector('span');er.textContent=fmt(geReg[ei]);if(s)er.appendChild(s);}
      const ed=document.getElementById('mgemp-drv-'+ei); if(ed){const s=ed.querySelector('span');ed.textContent=fmt(geDrv[ei]);if(s)ed.appendChild(s);}
    }
  } else {
    const dgr=document.getElementById('dgfor-reg'); if(dgr) dgr.textContent=fmt(gfReg);
    const dgd=document.getElementById('dgfor-drv'); if(dgd) dgd.textContent=fmt(gfDrv);
    for(let ei=0;ei<EMPS;ei++){
      const er=document.getElementById('dgemp-reg-'+ei); if(er) er.textContent=fmt(geReg[ei]);
      const ed=document.getElementById('dgemp-drv-'+ei); if(ed) ed.textContent=fmt(geDrv[ei]);
    }
  }
}

      return (mn && mn.value.trim()) || (dn && dn.value.trim()) || 'Emp ' + (ei+1);
    });
    let daySection = '\n--- ' + day.toUpperCase() + ' ---\n';
    let hasDay = false;
    for (let ji = 0; ji < JOBS; ji++) {
      const g = function(col, emp, drive) {
        if (isMob) {
          if (col) { const el = document.querySelector('input[data-mday="' + di + '"][data-mjob="' + ji + '"][data-mcol="' + col + '"]'); return el ? el.value : ''; }
          const sel2 = drive ? 'input[data-mday="' + di + '"][data-mjob="' + ji + '"][data-memp="' + emp + '"][data-mdrive]' : 'input[data-mday="' + di + '"][data-mjob="' + ji + '"][data-memp="' + emp + '"]:not([data-mdrive])';
          const el2 = document.querySelector(sel2); return el2 ? el2.value : '';
        } else {
          if (col) { const el = document.querySelector('input[data-day="' + di + '"][data-job="' + ji + '"][data-col="' + col + '"]'); return el ? el.value : ''; }
          const sel2 = drive ? 'input[data-day="' + di + '"][data-job="' + ji + '"][data-emp="' + emp + '"][data-drive]' : 'input[data-day="' + di + '"][data-job="' + ji + '"][data-emp="' + emp + '"]:not([data-drive])';
          const el2 = document.querySelector(sel2); return el2 ? el2.value : '';
        }
      };
      const jName=g('jobname'), jNum=g('jobnum'), fHrs=g('for'), fDrv=g('for-drive');
      const eHrs=[], eDrv=[];
      for (let ei=0;ei<EMPS;ei++){eHrs.push(g(null,ei,false));eDrv.push(g(null,ei,true));}
      if (jName||jNum||fHrs||eHrs.some(function(v){return v;})) {
        hasDay = true;
        daySection += '  Job ' + (ji+1) + ': ' + (jName||'\u2014') + ' (#' + (jNum||'\u2014') + ')\n';
        if (fHrs) daySection += '    Foreman      : ' + fHrs + ' hrs\n';
        eHrs.forEach(function(h,ei){ if(h) daySection += '    ' + empNames[ei].padEnd(12) + ': ' + h + ' hrs\n'; });
        if (fDrv||eDrv.some(function(v){return v;})) {
          daySection += '    \u21B3 Drive Time:\n';
          if (fDrv) daySection += '      Foreman      : ' + fDrv + ' hrs\n';
          eDrv.forEach(function(h,ei){ if(h) daySection += '      ' + empNames[ei].padEnd(12) + ': ' + h + ' hrs\n'; });
        }
      }
    }
    if (hasDay) {
      const ft = isMob ? document.getElementById('mfor-reg-'+di) : document.getElementById('dfor-reg-'+di);
      const ftxt = ft ? ft.textContent.replace(/\n.*/,'') : '\u2014';
      daySection += '  Day Total: Foreman=' + ftxt;
      for (let ei=0;ei<EMPS;ei++) {
        const te = isMob ? document.getElementById('memp-reg-'+di+'-'+ei) : document.getElementById('demp-reg-'+di+'-'+ei);
        const t = te ? te.textContent.replace(/\n.*/,'') : '\u2014';
        if (t && t!=='\u2014') daySection += ', ' + empNames[ei] + '=' + t;
      }
      body += daySection + '\n';
    }
  });

  body += '\n' + '='.repeat(52) + '\nWEEK TOTALS\n';
  const gf = isMob ? document.getElementById('mgfor-reg') : document.getElementById('dgfor-reg');
  body += 'Foreman     : ' + (gf ? gf.textContent.replace(/\n.*/,'') : '\u2014') + '\n';
  for (let ei=0;ei<EMPS;ei++) {
    const te = isMob ? document.getElementById('mgemp-reg-'+ei) : document.getElementById('dgemp-reg-'+ei);
    const t = te ? te.textContent.replace(/\n.*/,'') : '\u2014';
    if (t && t!=='\u2014') body += 'Emp ' + (ei+1) + '        : ' + t + '\n';
  }

  const subject = encodeURIComponent('Falcon Electric Timesheet \u2014 Week Ending ' + (weekEnding||'N/A') + ' \u2014 ' + (foreman||'Crew'));
  window.location.href = 'mailto:' + EMAILS + '?subject=' + subject + '&body=' + encodeURIComponent(body);
  showConfirm(body);
  showToast('\u26A1 Email client opening...');
}

// ── INIT ───────────────────────────────────────────────────────────
buildDesktop();
buildMobile();
const we = document.getElementById('weekEnding');
if (!we.value) we.value = getNextSunday();
loadSaved();
</script>
